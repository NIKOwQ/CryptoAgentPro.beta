version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "127.0.0.1:8400:8000"
    env_file:
      - .env
    environment:
      - MONGODB_HOST=mongodb
      - REDIS_HOST=redis
      - DEBUG=false
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "127.0.0.1:3400:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:4.4
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
